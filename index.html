(function(){

var uid=function(){return Math.random().toString(36).slice(2,9)};
var CHIPS=[["#5eead4","#134e4a","#115e59"],["#fcd34d","#78350f","#92400e"],["#7dd3fc","#0c4a6e","#075985"],["#fda4af","#881337","#9f1239"],["#c4b5fd","#4c1d95","#5b21b6"],["#bef264","#365314","#3f6212"],["#f0abfc","#701a75","#86198f"],["#67e8f9","#164e63","#155e75"],["#fdba74","#7c2d12","#9a3412"],["#a5b4fc","#312e81","#3730a3"]];
function chipFor(id){var i=data.skills.findIndex(function(s){return s.id===id});return CHIPS[(i<0?0:i)%CHIPS.length]}

/* ---------- seed ---------- */

 var jobDefs=[

/* ---------- CSV ---------- */
function csvParse(text){

 var first=text.split("\n")[0]||"";
 var delim=first.indexOf("\t")>=0?"\t":",";
 var rows=[],row=[],cur="",i=0,q=false;
 while(i<text.length){var ch=text[i];
  if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i+=2;continue}q=false;i++;continue}cur+=ch;i++;continue}
  if(ch==='"'){q=true;i++;continue}
  if(ch===delim){row.push(cur);cur="";i++;continue}
  if(ch==="\n"){row.push(cur);rows.push(row);row=[];cur="";i++;continue}

}
function csvCell(v){v=(v==null?"":String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}

/* ---------- sheet import ---------- */
function norm(x){return x==null?"":String(x).trim()}

 var rows=csvParse(text||"");if(!rows.length)return null;
 var header=rows[0].map(function(h){return norm(h).toLowerCase()});

 var pC=find(["person","player","owner","user","account"]),cC=find(["character","char","unit","hero","build"]),jC=find(["job","jobs","class","classes","profession"]),sC=find(["skills","skill","roles","role","tags","provides"]),nC=find(["needs","need","requires","requirement","requirements","depends","dependencies","relies"]);
 var has=pC!==-1||cC!==-1||sC!==-1||nC!==-1||jC!==-1;
 if(!has){pC=0;cC=1;jC=2;sC=3;nC=4}else{if(pC===-1)pC=0;if(cC===-1)cC=1;if(sC===-1)sC=2;rows=rows.slice(1)}

 var pMap={},pOrder=[],jMap={};

  var jobId=jobName?ensureJob(jobName,sids):null;
  if(!pMap[person]){pMap[person]={id:uid(),name:person,characters:[]};pOrder.push(person)}
  pMap[person].characters.push({id:uid(),name:character,jobId:jobId,skillIds:sids,needIds:nids});
 });

}
function parseJobsSheet(text){

 var jC=find(["job","jobs","class","classes","profession"]),sC=find(["skills","skill","roles","role","grants","provides"]),nC=find(["needs","need","requires","requirement","requirements","depends","dependencies","relies"]);

/* ---------- optimizer ---------- */
function getChar(people,pid,cid){var p=people.find(function(x){return x.id===pid});return p?p.characters.find(function(c){return c.id===cid}):null}
function pickBestChar(person,covered,rs,mode,usedChars){usedChars=usedChars||new Set();var best=null,bk=-1;person.characters.forEach(function(c){if(usedChars.has(c.id)||c.done)return;var rg=Array.from(rs).filter(function(s){return c.skillIds.indexOf(s)>=0&&!covered.has(s)}).length;var cg=c.skillIds.filter(function(s){return!covered.has(s)}).length;var k=(mode==="required"?rg*100:0)+cg;if(k>bk){bk=k;best=c}});return best?best.id:null}
function buildParty(o){
 var people=o.people,size=o.size,mode=o.mode,requiredIds=o.requiredIds,requiredJobIds=o.requiredJobIds||[],requiredClasses=o.requiredClasses||[],pinned=o.pinned,benched=o.benched,usedChars=o.usedChars||new Set();
 var rs=new Set(mode==="required"?requiredIds:[]);var rj=new Set(requiredJobIds);var rc=new Set(requiredClasses.map(function(x){return(x||"").toLowerCase()}));var classOf=function(c){return(c.jobId&&jobById[c.jobId]&&jobById[c.jobId].cls)?jobById[c.jobId].cls.toLowerCase():"";};var ignorePrio=o.ignorePrio===true;var prioVal=function(c){return ignorePrio?0:(4-(c.priority==null?3:c.priority));};var relevant=new Set();if(mode==="required"){requiredIds.forEach(function(s){relevant.add(s)});people.forEach(function(p){p.characters.forEach(function(c){(c.needIds||[]).forEach(function(s){relevant.add(s)});(c.goodIds||[]).forEach(function(s){relevant.add(s)})})})}var isRel=function(s){return mode!=="required"||relevant.has(s)};
 var avail=people.filter(function(p){return!benched.has(p.id)&&p.characters.some(function(c){return!usedChars.has(c.id)&&!c.done})});
 var cands=[];
 for(var r=0;r<80;r++){
  var chosen=[],used=new Set(),covered=new Set(),covJobs=new Set(),covClasses=new Set();
  var add=function(pid,cid){chosen.push({personId:pid,characterId:cid});used.add(pid);var ch=getChar(people,pid,cid);if(ch){ch.skillIds.forEach(function(s){covered.add(s)});if(ch.jobId)covJobs.add(ch.jobId);var _cl=classOf(ch);if(_cl)covClasses.add(_cl)}};
  Object.keys(pinned).forEach(function(pid){if(chosen.length>=size)return;if(benched.has(pid)||used.has(pid))return;var person=people.find(function(p){return p.id===pid});if(!person||!person.characters.length)return;var cid=pinned[pid];if(!cid||usedChars.has(cid)||!person.characters.find(function(c){return c.id===cid}))cid=pickBestChar(person,covered,rs,mode,usedChars);if(cid)add(pid,cid)});
  var cand=function(){return avail.filter(function(p){return!used.has(p.id)})};
  if(!chosen.length&&r>0){var sp0=cand();if(sp0.length){var sp=sp0[Math.floor(Math.random()*sp0.length)];var scs=sp.characters.filter(function(c){return!usedChars.has(c.id)&&!c.done});if(scs.length)add(sp.id,scs[Math.floor(Math.random()*scs.length)].id)}}
  while(chosen.length<size){var us=Array.from(rs).filter(function(s){return!covered.has(s)});var uj=Array.from(rj).filter(function(j){return!covJobs.has(j)});var uc=Array.from(rc).filter(function(x){return!covClasses.has(x)});if(!us.length&&!uj.length&&!uc.length)break;var bg=0,ties=[];cand().forEach(function(p){p.characters.forEach(function(c){if(usedChars.has(c.id)||c.done)return;var sg=c.skillIds.filter(function(s){return rs.has(s)&&!covered.has(s)}).length;var jg=c.jobId&&rj.has(c.jobId)&&!covJobs.has(c.jobId)?1:0;var _cc=classOf(c);var kg=(_cc&&rc.has(_cc)&&!covClasses.has(_cc))?1:0;var g=sg+jg+kg;if(g>bg){bg=g;ties=[{p:p,c:c}]}else if(g===bg&&g>0)ties.push({p:p,c:c})})});if(bg<=0||!ties.length)break;var _bp=-1,_pts=[];ties.forEach(function(t){var _pv=prioVal(t.c);if(_pv>_bp){_bp=_pv;_pts=[t]}else if(_pv===_bp)_pts.push(t)});var pk=_pts[Math.floor(Math.random()*_pts.length)];add(pk.p.id,pk.c.id)}
  while(chosen.length<size){var cc=cand();if(!cc.length)break;var curChars=chosen.map(function(m){return getChar(people,m.personId,m.characterId)}).filter(Boolean);var um=curChars.filter(function(ch){return(ch.needIds||[]).some(function(s){return!covered.has(s)})});var neededNow=new Set();curChars.forEach(function(ch){(ch.needIds||[]).forEach(function(s){if(!covered.has(s))neededNow.add(s)})});var _prel={};rs.forEach(function(s){_prel[s]=1});curChars.forEach(function(ch){(ch.needIds||[]).forEach(function(s){_prel[s]=1});(ch.goodIds||[]).forEach(function(s){_prel[s]=1})});var _pr=function(s){return mode!=="required"||_prel[s]};var bs=-1e9,t2=[];cc.forEach(function(p){p.characters.forEach(function(c){if(usedChars.has(c.id)||c.done)return;var prov=c.skillIds;var cg=prov.filter(function(s){return!covered.has(s)&&_pr(s)}).length;var nc=prov.filter(function(s){return neededNow.has(s)}).length;var provRel=prov.filter(_pr).length;var dh=um.filter(function(m){return(m.needIds||[]).every(function(s){return covered.has(s)||prov.indexOf(s)>=0})}).length;var so=(c.needIds||[]).every(function(s){return covered.has(s)||prov.indexOf(s)>=0})?1:0;var _hnm=((c.needIds||[]).length&&so)?1:0;var sc=nc*12+dh*5+so*3+_hnm*4+cg+provRel*0.4+prioVal(c)*3+Math.random()*3;if(sc>bs){bs=sc;t2=[{p:p,c:c}]}else if(sc===bs)t2.push({p:p,c:c})})});var pk2=t2[Math.floor(Math.random()*t2.length)];add(pk2.p.id,pk2.c.id)}
  (function(){var changed=true;while(changed){changed=false;var cov=new Set();chosen.forEach(function(m){var ch=getChar(people,m.personId,m.characterId);if(ch)ch.skillIds.forEach(function(s){cov.add(s)})});for(var qi=0;qi<chosen.length;qi++){var ch=getChar(people,chosen[qi].personId,chosen[qi].characterId);if(ch&&(ch.needIds||[]).some(function(s){return!cov.has(s)})&&!(pinned&&pinned[chosen[qi].personId]===chosen[qi].characterId)){chosen.splice(qi,1);changed=true;break;}}}})();
  covered=new Set();covJobs=new Set();covClasses=new Set();chosen.forEach(function(m){var ch=getChar(people,m.personId,m.characterId);if(ch){ch.skillIds.forEach(function(s){covered.add(s)});if(ch.jobId)covJobs.add(ch.jobId);var _cl=classOf(ch);if(_cl)covClasses.add(_cl)}});
  var reqCov=Array.from(rs).filter(function(s){return covered.has(s)}).length;
  var reqJ=Array.from(rj).filter(function(j){return covJobs.has(j)}).length;
  var reqK=Array.from(rc).filter(function(x){return covClasses.has(x)}).length;
  var chars=chosen.map(function(m){return getChar(people,m.personId,m.characterId)}).filter(Boolean);
  var deps=chars.filter(function(ch){return(ch.needIds||[]).every(function(s){return covered.has(s)})}).length;
  var unmetNeed=0;chars.forEach(function(ch){(ch.needIds||[]).forEach(function(s){if(!covered.has(s))unmetNeed++})});
  var goodSet={};chars.forEach(function(ch){(ch.goodIds||[]).forEach(function(s){goodSet[s]=1})});var goodCov=Object.keys(goodSet).filter(function(s){return covered.has(s)}).length;
  var prioSum=0;chars.forEach(function(ch){prioSum+=prioVal(ch)});
  var _needSet={};chars.forEach(function(ch){(ch.needIds||[]).forEach(function(s){_needSet[s]=1})});var _relP={};rs.forEach(function(s){_relP[s]=1});Object.keys(_needSet).forEach(function(s){_relP[s]=1});Object.keys(goodSet).forEach(function(s){_relP[s]=1});var relCov=0;covered.forEach(function(s){if(mode!=="required"||_relP[s])relCov++});var _pc={};chars.forEach(function(ch){var _sn={};ch.skillIds.forEach(function(s){if(_needSet[s]&&!_sn[s]){_sn[s]=1;_pc[s]=(_pc[s]||0)+1}})});var _redun=0;Object.keys(_pc).forEach(function(s){if(_pc[s]>1)_redun+=_pc[s]-1});var _needMet=0;chars.forEach(function(ch){if((ch.needIds||[]).length&&(ch.needIds||[]).every(function(s){return covered.has(s)}))_needMet++});var _hard=deps*100000-unmetNeed*10000+reqCov*1000+reqJ*1000+reqK*1000+prioSum*30;var _soft=goodCov*20+relCov*10-_redun*40+_needMet*25+chosen.length;var score=_hard+_soft;
  cands.push({chosen:chosen,covered:new Set(covered),coveredJobs:new Set(covJobs),coveredClasses:new Set(covClasses),score:score,hard:_hard,soft:_soft,unmetNeed:unmetNeed});
 }
 if(!cands.length)return null;var _mh=cands[0].hard;cands.forEach(function(c){if(c.hard>_mh)_mh=c.hard});var _ph=cands.filter(function(c){return c.hard>=_mh-15});var _ms=_ph[0].soft;_ph.forEach(function(c){if(c.soft>_ms)_ms=c.soft});var _pool=_ph.filter(function(c){return c.soft>=_ms-60});var best=_pool[Math.floor(Math.random()*_pool.length)];
 var missing=mode==="required"?requiredIds.filter(function(s){return!best.covered.has(s)}):[];
 var missingJ=requiredJobIds.filter(function(j){return!best.coveredJobs.has(j)});
 var missingC=requiredClasses.filter(function(x){return!best.coveredClasses.has((x||"").toLowerCase())});

}

/* ---------- state ---------- */
var data,skillById,jobById;
var st={tab:"build",size:6,count:5,mode:"required",bossRun:"",resultsBoss:"",required:[],requiredJobs:[],requiredClasses:[],benched:new Set(),locks:{},completed:{},prio:{1:true,2:true,3:true,none:false},results:null};
function reindex(){skillById={};data.skills.forEach(function(s){skillById[s.id]=s});jobById={};data.jobs.forEach(function(j){jobById[j.id]=j});(data.people||[]).forEach(function(p){p.characters.forEach(function(c){var base=(c.jobId&&jobById[c.jobId]?(jobById[c.jobId].skillIds||[]):[]);var out=base.slice();(c.extraSkillIds||[]).forEach(function(id){if(out.indexOf(id)<0)out.push(id)});c.skillIds=out})})}
function skillsCell(p,c){var eff=c.skillIds||[];var h='<td><div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-width:120px">';eff.forEach(function(sid){var sk=skillById[sid];if(!sk)return;var cc=chipFor(sid);h+='<span style="display:inline-flex;align-items:center;border-radius:999px;border:1px solid '+cc[2]+';background:'+cc[1]+';color:'+cc[0]+';padding:2px 8px;font-size:12px">'+esc(sk.name)+'</span>'});if(!eff.length)h+='<span style="color:#475569;font-size:12px">\u2014</span>';h+='</div></td>';return h}
function addCharSkill(pid,cid,name){name=(name||"").trim();if(!name)return;var sid=ensureSkills([name])[0];var c=getChar(data.people,pid,cid);if(!c)return;var base=(c.jobId&&jobById[c.jobId]?(jobById[c.jobId].skillIds||[]):[]);c.extraSkillIds=c.extraSkillIds||[];if(base.indexOf(sid)<0&&c.extraSkillIds.indexOf(sid)<0)c.extraSkillIds.push(sid);reindex();save()}
function removeCharSkill(pid,cid,sid){var c=getChar(data.people,pid,cid);if(!c)return;c.extraSkillIds=(c.extraSkillIds||[]).filter(function(x){return x!==sid});reindex();save()}

function act(a){
 if(a==="exportCsv")exportCSV();
 else if(a==="syncSheet")syncFromSheet();
 else if(a==="exportJson")exportJSON();
 else if(a==="importCsv")byId("fileCsv").click();
 else if(a==="importJson")byId("fileJson").click();
 else if(a==="addRow"){addRow();render()}
 else if(a==="addJob"){addJobRow();render()}
 else if(a==="addSkill"){addSkillGlobal();render()}
 else if(a==="syncSkills")syncSkillsFromSheet();
 else if(a==="exportSkillsCsv")exportSkillsCSV();
 else if(a==="importSkillsCsv")byId("fileSkillsCsv").click();
 else if(a==="syncJobs")syncJobsFromSheet();
 else if(a==="exportJobsCsv")exportJobsCSV();
 else if(a==="importJobsCsv")byId("fileJobsCsv").click();
 else if(a==="sample"){if(confirm("Reset to the sample roster? This clears your current data.")){applyRoster(seedData());render()}}
 else if(a==="clear"){if(confirm("Remove all people, jobs, and skills?")){applyRoster({skills:[],people:[],jobs:[]});render()}}
}
function byId(x){return document.getElementById(x)}
function qsa(s){return Array.prototype.slice.call(root.querySelectorAll(s))}

byId("fileCsv").onchange=function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){if(!importRosterKeepJobs(rd.result)){alert("Couldn't read any rows. Check for Person and Character columns (Job optional).");return}render()};rd.readAsText(f);e.target.value=""};
byId("fileJobsCsv").onchange=function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){if(!importJobsCSV(rd.result)){alert("Couldn't read any jobs. Use a Job column (Class, Skills, Needs, Good to have optional).");return}render()};rd.readAsText(f);e.target.value=""};
byId("fileSkillsCsv").onchange=function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){if(!importSkillsCSV(rd.result)){alert("Couldn't read any skills. Use a single Skill column.");return}render()};rd.readAsText(f);e.target.value=""};
byId("fileJson").onchange=function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var d=migrate(JSON.parse(rd.result));if(d&&d.people){applyRoster(d);render()}else alert("That file doesn't look like a roster export.")}catch(err){alert("Couldn't read that file.")}};rd.readAsText(f);e.target.value=""};

render();
})();
</script>
